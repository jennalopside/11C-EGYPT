<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive of the Nile</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #f7f4eb;
            -webkit-user-select: none; user-select: none; 
        }
        
        /* Flexbox Wrapper: Forces whatever is inside it to stay perfectly centered */
        .wrapper { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            display: flex;
            justify-content: center; /* Aligns horizontally center */
            align-items: center;     /* Aligns vertically center */
        }
        
        iframe { 
            /* The oversized frame dimensions that clip the watermark */
            width: 106%; 
            height: 108%; 
            
            /* Reset all manual shifting so Flexbox can do its job */
            margin: 0; 
            
            border: none; 
            display: block;
            flex-shrink: 0; /* Prevents the browser from warping the iframe size */
        }
    </style>
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123) { return false; }
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; }
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; }
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; }
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; }
            if (e.metaKey && e.altKey && e.keyCode == 'I'.charCodeAt(0)) { return false; }
        };
    </script>
</head>
<body>
    <div class="wrapper">
        <iframe src="https://nile-archive-hub.base44.app"></iframe>
    </div>
</body>
</html>
